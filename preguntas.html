<title>Preguntas ❤️</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff1f7);
    font-family:Arial, sans-serif;
}

.contenedor{
    width:90%;
    max-width:650px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#d63384;
    margin-bottom:25px;
}

#pregunta{
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    line-height:1.5;
    color:#333;
    opacity:1;
}

button{
    border:none;
    background:#d63384;
    color:white;
    padding:14px 26px;
    border-radius:10px;
    font-size:1rem;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

.oculto{
    display:none;
}

/* Animación de salida */
.fade-out{
    opacity:0;
    transform:translateY(10px);
    transition:all .25s ease;
}

/* Animación de entrada */
.fade-in{
    animation:aparecer .45s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(15px) scale(.98);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}
</style>
</head>

<div class="contenedor">

    <h1>Preguntas para Parejas ❤️</h1>

    <div id="pregunta">
        Presiona el botón para comenzar.
    </div>

    <button id="btnComenzar">

const pregunta = document.getElementById("pregunta");
const btnComenzar = document.getElementById("btnComenzar");
const btnNueva = document.getElementById("btnNueva");

function obtenerPreguntaAleatoria() {
    return preguntas[Math.floor(Math.random() * preguntas.length)];
}

function mostrarPregunta() {

    pregunta.classList.add("fade-out");

    setTimeout(() => {

        pregunta.textContent = obtenerPreguntaAleatoria();

        pregunta.classList.remove("fade-out");
        pregunta.classList.remove("fade-in");

        void pregunta.offsetWidth; 

        pregunta.classList.add("fade-in");

    }, 250);
}

btnComenzar.addEventListener("click", () => {

    btnComenzar.classList.add("oculto");
    btnNueva.classList.remove("oculto");

    mostrarPregunta();
});

btnNueva.addEventListener("click", mostrarPregunta);
